<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tattoo Trap</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Archivo:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* default = atelier; JS overrides on load */
    --paper: #f3f0e9; --paper-2: #eceadf; --card: #faf8f2;
    --ink: #1a1714; --ink-soft: #6f6a60; --ink-faint: #a39d90;
    --line: #ddd8cb; --line-strong: #c8c2b2; --accent: #1a1714;
    --radius: 2px; --radius-img: 1px;
    --font-display: 'Newsreader', Georgia, serif;
    --font-body: 'Archivo', system-ui, sans-serif;
    --font-mono: 'Spline Sans Mono', ui-monospace, monospace;
    --display-weight: 420; --display-tracking: -0.01em; --label-tracking: 0.18em; --display-italic: italic;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  ::selection { background: color-mix(in oklab, var(--accent) 22%, transparent); }
  button { font-family: inherit; }
  a { color: inherit; }
  .tt-row { transition: opacity .16s ease; }
  .tt-row:hover { opacity: 0.62; }
  @keyframes tt-scan { 0% { transform: translateY(-72px); } 100% { transform: translateY(240px); } }
  .tt-scan > div { animation: tt-scan 1.3s ease-in-out infinite; }
  @keyframes tt-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  .tt-pulse { animation: tt-pulse 0.9s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) {
    .tt-scan > div, .tt-pulse { animation: none; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/data.js"></script>
<script src="src/theme.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/plates.jsx"></script>
<script type="text/babel" src="src/screens.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
